<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://pvrinomtszbguydmyiqc.supabase.co https://accounts.google.com; img-src 'self' data:; frame-ancestors 'none';">
    <title>PGCIS Asset Registry</title>
    <!-- Pinned to 2.103.3 with SRI hash — update both when upgrading the library.
         To regenerate: curl -s https://cdn.jsdelivr.net/npm/@supabase/supabase-js@VERSION/dist/umd/supabase.js | openssl dgst -sha384 -binary | openssl base64 -A -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.js"
            integrity="sha384-hCWGwlkWlatZlBB+xRL7caQ0wei4AIvA80dQT3CEhafaMinAJQdfdb99y48Oai+Q"
            crossorigin="anonymous"></script>
    <style>
        :root {
            --blue:        #2e4387;
            --blue-light:  #3d5aab;
            --text:        #111827;
            --muted:       #6b7280;
            --bg:          #f3f4f6;
            --card:        #ffffff;
            --border:      #e5e7eb;
            --green:       #10b981;
            --yellow:      #f59e0b;
            --red:         #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Header */
        .hdr { background: var(--blue); color: #fff; padding: 14px 18px;
               display: flex; justify-content: space-between; align-items: center; }
        .hdr-title { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
        .hdr-sub { font-size: 11px; opacity: .7; margin-top: 1px; }
        .hdr-badge { background: rgba(255,255,255,.18); padding: 5px 12px;
                     border-radius: 20px; font-size: 13px; font-weight: 600;
                     font-family: monospace; letter-spacing: .05em; white-space: nowrap; }

        /* Layout */
        .wrap { max-width: 580px; margin: 0 auto; padding: 18px 14px 40px; }

        /* Cards */
        .card { background: var(--card); border: 1px solid var(--border);
                border-radius: 10px; padding: 16px; margin-bottom: 14px; }
        .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase;
                      letter-spacing: .07em; color: var(--muted); margin-bottom: 12px; }

        /* Field rows */
        .row { display: flex; justify-content: space-between; align-items: flex-start;
               padding: 9px 0; border-bottom: 1px solid var(--border); gap: 12px; }
        .row:last-child { border-bottom: none; }
        .row-label { font-size: 13px; color: var(--muted); flex-shrink: 0; }
        .row-val { font-size: 13px; font-weight: 500; text-align: right; word-break: break-word; }
        .row-val.mono { font-family: monospace; }

        /* Status badges */
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px;
                 font-size: 12px; font-weight: 600; }
        .badge-available  { background: #d1fae5; color: #065f46; }
        .badge-checked-out{ background: #fef3c7; color: #92400e; }
        .badge-in-field   { background: #dbeafe; color: #1e40af; }
        .badge-in-repair  { background: #fee2e2; color: #991b1b; }

        /* Alerts */
        .alert { padding: 11px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
        .alert-info    { background: #dbeafe; color: #1e40af; }
        .alert-success { background: #d1fae5; color: #065f46; }
        .alert-warn    { background: #fef3c7; color: #92400e; }
        .alert-error   { background: #fee2e2; color: #991b1b; }

        /* Buttons */
        .btn { display: block; width: 100%; padding: 13px; border: none; border-radius: 8px;
               font-size: 15px; font-weight: 600; cursor: pointer; text-align: center;
               transition: opacity .15s; }
        .btn:hover { opacity: .88; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-primary  { background: var(--blue); color: #fff; }
        .btn-success  { background: var(--green); color: #fff; }
        .btn-ghost    { background: transparent; border: 2px solid var(--blue);
                        color: var(--blue); padding: 11px; }
        .btn-stack { display: flex; flex-direction: column; gap: 10px; }

        /* Forms */
        .fg { margin-bottom: 14px; }
        .fg:last-child { margin-bottom: 0; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--muted);
                margin-bottom: 5px; }
        label .req { color: var(--red); }
        input, select, textarea {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; background: #fff; color: var(--text);
            appearance: none; }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(46,67,135,.1); }
        textarea { resize: vertical; min-height: 72px; }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Spinner */
        .spin-wrap { text-align: center; padding: 60px 20px; color: var(--muted); }
        .spinner { display: inline-block; width: 30px; height: 30px;
                   border: 3px solid var(--border); border-top-color: var(--blue);
                   border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* New-asset hero */
        .hero { text-align: center; padding: 18px 0 6px; }
        .hero-id { font-size: 26px; font-weight: 700; color: var(--blue);
                   font-family: monospace; margin: 8px 0; letter-spacing: .04em; }
        .hero-sub { font-size: 13px; color: var(--muted); margin-bottom: 4px; }

        /* History */
        .hist-item { padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .hist-item:last-child { border-bottom: none; }
        .hist-who { font-weight: 600; }
        .hist-when { color: var(--muted); font-size: 12px; margin-top: 2px; }

        /* Search */
        .search-wrap { text-align: center; padding-top: 30px; }
        .search-logo { font-size: 13px; font-weight: 700; color: var(--blue);
                       letter-spacing: .08em; margin-bottom: 6px; }
        .search-tagline { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

        /* Footer */
        .foot { text-align: center; font-size: 11px; color: var(--muted); margin-top: 18px; }

        /* Lost / found screen */
        .lost-screen { max-width: 400px; margin: 36px auto; padding: 0 18px; text-align: center; }
        .lost-mark { width: 60px; height: 60px; background: var(--blue); border-radius: 50%;
                     display: flex; align-items: center; justify-content: center;
                     margin: 0 auto 16px; }
        .lost-company { font-size: 11px; font-weight: 700; letter-spacing: .12em;
                        color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
        .lost-headline { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .lost-sub { font-size: 14px; color: var(--muted); line-height: 1.55; margin-bottom: 22px; }
        .contact-card { background: var(--card); border: 1px solid var(--border);
                        border-radius: 10px; padding: 16px; text-align: left; margin-bottom: 20px; }
        .contact-row { display: flex; align-items: baseline; gap: 10px; padding: 8px 0;
                       border-bottom: 1px solid var(--border); font-size: 14px; }
        .contact-row:last-child { border-bottom: none; }
        .contact-lbl { font-size: 11px; font-weight: 700; color: var(--muted); width: 56px;
                       flex-shrink: 0; text-transform: uppercase; letter-spacing: .05em; }
        .contact-val { font-weight: 500; }
        .emp-signin { font-size: 12px; color: var(--muted); margin-top: 14px; }
        .emp-signin button { background: none; border: none; color: var(--blue); cursor: pointer;
                             font-size: 12px; font-weight: 600; text-decoration: underline; padding: 0; }

        /* Locked-field display inside update form */
        .locked-row { display: flex; align-items: center; justify-content: space-between;
                      padding: 9px 0; border-bottom: 1px solid var(--border); }
        .locked-row:last-of-type { border-bottom: none; }
        /* Admin hardware edit card */
        .admin-hw-card { border-color: var(--yellow) !important; background: #fffdf0; }
        .locked-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
        .locked-val { font-size: 13px; font-weight: 500; }
        .lock-pill { font-size: 10px; font-weight: 700; color: var(--muted); background: var(--border);
                     padding: 2px 7px; border-radius: 10px; margin-left: 8px; letter-spacing: .04em; }

        /* Signed-in user badge in header */
        .hdr-right { display: flex; align-items: center; gap: 10px; }
        .hdr-user { font-size: 11px; text-align: right; opacity: .85; }
        .hdr-signout { background: rgba(255,255,255,.18); border: none; color: #fff;
                       font-size: 11px; padding: 3px 9px; border-radius: 10px; cursor: pointer;
                       margin-top: 3px; display: block; width: 100%; }
    </style>
</head>
<body>

<script>

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2cmlub210c3piZ3V5ZG15aXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5ODU0MTAsImV4cCI6MjA4MzU2MTQxMH0.bG6cumnrKMtUdlOsGSyq-5hMJa-E6-zml0ALf0ylHmo';

// ----------------------------------------------------------------
// Deploy-config guard — runs immediately on page load.
// If SUPABASE_URL has been filled in but the CSP connect-src still

// mismatch can't be missed during setup.
// ----------------------------------------------------------------
(function checkDeployConfig() {
    const credsSet = !SUPABASE_URL.includes('YOUR_PROJECT_REF')
                  && !SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY_HERE');
    if (!credsSet) return; // not yet configured — nothing to validate

// ----------------------------------------------------------------
// HTML escaping — applied to ALL database-sourced values before
// they are injected into innerHTML to prevent stored XSS.
// ----------------------------------------------------------------
function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Holds the last loaded asset so forms can reference it without
// injecting raw JSON into onclick attributes (XSS-safe).
let _asset   = null;
let _session = null;
let _user    = null;

function isAdmin() {
    return _user && ADMIN_EMAILS.includes(_user.email.toLowerCase());
}

// ────────────────────────────────────────────────────────────────
// URL helpers
// ────────────────────────────────────────────────────────────────
function getIdFromUrl() {
    const p = new URLSearchParams(window.location.search);
    const id = p.get('id') || p.get('asset');
    return id ? id.toUpperCase().trim() : null;
}

function fmtDate(v) {
    if (!v) return '—';
    return new Date(v).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtDateTime(v) {
    if (!v) return '—';
    return new Date(v).toLocaleString('en-US', { month: 'short', day: 'numeric',
        year: 'numeric', hour: 'numeric', minute: '2-digit' });
}

function statusBadge(s) {
    const map = {
        'available':   ['Available',    'available'],
        'checked-out': ['Checked Out',  'checked-out'],
        'in-field':    ['In Field',     'in-field'],
        'in-repair':   ['In Repair',    'in-repair'],
    };
    const [label, cls] = map[s] || ['Available', 'available'];
    return `<span class="badge badge-${cls}">${label}</span>`;
}

// ────────────────────────────────────────────────────────────────
// Render helpers
// ────────────────────────────────────────────────────────────────
function render(html) { document.getElementById('app').innerHTML = html; }

function setAlert(msg, type) {
    const el = document.getElementById('form-alert');
    if (el) el.innerHTML = msg ? `<div class="alert alert-${escapeHtml(type)}">${escapeHtml(msg)}</div>` : '';
}

function header(assetId) {
    const userBlock = _user ? `
        <div class="hdr-user">
            ${escapeHtml(_user.email)}
            <button class="hdr-signout" onclick="signOut()">Sign Out</button>
        </div>` : '';
    return `<div class="hdr">
        <div><div class="hdr-title">PGCIS Asset Registry</div>
             <div class="hdr-sub">PACHYDERM GLOBAL</div></div>
        <div class="hdr-right">
            ${assetId ? `<div class="hdr-badge">${escapeHtml(assetId)}</div>` : ''}
            ${userBlock}
        </div>
    </div>`;
}

// ────────────────────────────────────────────────────────────────
// Views
// ────────────────────────────────────────────────────────────────
function showSpinner() {
    render(`<div class="spin-wrap"><div class="spinner"></div><br>Loading asset...</div>`);
}

function showAsset(asset) {
    _asset = asset;
    const co = asset.checkout_status || 'available';
    const isOut = co === 'checked-out' || co === 'in-field';

    render(`
        ${header(asset.asset_id)}
        <div class="wrap">

            <div class="card">
                <div class="row">
                    <span class="row-label">Status</span>
                    <span class="row-val">${statusBadge(co)}</span>
                </div>
                <div class="row">
                    <span class="row-label">Type</span>
                    <span class="row-val">${escapeHtml(asset.asset_type) || '—'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Make / Model</span>
                    <span class="row-val">${[escapeHtml(asset.make), escapeHtml(asset.model)].filter(Boolean).join(' ') || '—'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Serial Number</span>
                    <span class="row-val mono">${escapeHtml(asset.serial_number) || '—'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Assigned To</span>
                    <span class="row-val">${escapeHtml(asset.assigned_to) || 'Unassigned'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Home Location</span>
                    <span class="row-val">${escapeHtml(asset.home_location) || '—'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Condition</span>
                    <span class="row-val">${escapeHtml(asset.condition) || '—'}</span>
                </div>
                ${asset.description ? `
                <div class="row">
                    <span class="row-label">Description</span>
                    <span class="row-val">${escapeHtml(asset.description)}</span>
                </div>` : ''}
            </div>

            ${isOut ? `
            <div class="card">
                <div class="card-title">Currently Checked Out</div>
                <div class="row">
                    <span class="row-label">Checked Out To</span>
                    <span class="row-val">${escapeHtml(asset.checked_out_to) || '—'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Checkout Date</span>
                    <span class="row-val">${fmtDateTime(asset.checkout_date)}</span>
                </div>
                <div class="row">
                    <span class="row-label">Site / Project</span>
                    <span class="row-val">${escapeHtml(asset.checkout_site) || '—'}</span>
                </div>
                <div class="row">
                    <span class="row-label">Expected Return</span>
                    <span class="row-val">${fmtDate(asset.expected_return)}</span>
                </div>
                ${asset.last_checkout_notes ? `
                <div class="row">
                    <span class="row-label">Notes</span>
                    <span class="row-val">${escapeHtml(asset.last_checkout_notes)}</span>
                </div>` : ''}
            </div>` : ''}

            ${asset.calibration_required ? `
            <div class="card">
                <div class="card-title">Calibration</div>
                <div class="row">
                    <span class="row-label">Last Calibrated</span>
                    <span class="row-val">${fmtDate(asset.last_calibration_date)}</span>
                </div>
                <div class="row">
                    <span class="row-label">Next Due</span>
                    <span class="row-val">${fmtDate(asset.next_calibration_date)}</span>
                </div>
                <div class="row">
                    <span class="row-label">Provider</span>
                    <span class="row-val">${escapeHtml(asset.calibration_provider) || '—'}</span>
                </div>
            </div>` : ''}

            ${asset.notes ? `
            <div class="card">
                <div class="card-title">Notes</div>
                <p style="font-size:13px;color:var(--muted);white-space:pre-wrap">${escapeHtml(asset.notes)}</p>
            </div>` : ''}

            <div class="btn-stack">
                ${isOut ? `
                    <button class="btn btn-success" onclick="viewCheckin()">Check In This Equipment</button>
                    <button class="btn btn-primary" onclick="viewTransfer()">Transfer to Another Person / Site</button>
                ` : `
                    <button class="btn btn-primary" onclick="viewCheckout()">Check Out This Equipment</button>
                `}
                <button class="btn btn-ghost" onclick="viewReassign()">Reassign / Unassign</button>
                <button class="btn btn-ghost" onclick="viewUpdate()">Update Asset Info</button>
            </div>

            <div class="foot">
                Registered ${fmtDate(asset.created_at)} by ${escapeHtml(asset.created_by) || 'unknown'}
            </div>
        </div>
    `);
}

async function signIn() {
    // Show spinner while OAuth redirect happens
    render(`<div class="spin-wrap"><div class="spinner"></div><br>Signing in...</div>`);
    const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
            redirectTo: window.location.href,   // preserves ?id= param through OAuth round-trip
            queryParams: { hd: 'pgcis.com' }    // hints Google to show only PGCIS accounts
        }
    });
    if (error) showError('Sign-in error: ' + error.message);
}

    await sb.auth.signOut();
    _session = null; _user = null;

async function loadAsset(assetId) {
    showSpinner();
    const { data, error } = await sb
        .from('asset_equipment')
        .select('*')
        .eq('asset_id', assetId)
        .maybeSingle();

    if (error) {
        showError('Database error: ' + error.message);
        return;
    }

    if (data) {
        // Log the scan as a "last seen" update (fire-and-forget)
        sb.from('asset_equipment')
          .update({ last_seen_date: new Date().toISOString(),
                    last_seen_location: 'QR Scan' })
          .eq('asset_id', assetId);

        showAsset(data);
    } else {
        showRegisterForm(assetId);
    }
}

async function submitRegister(evt) {
    evt.preventDefault();
    const fd = new FormData(evt.target);
    const assetId = fd.get('_asset_id');

    const payload = {
        asset_id:               assetId,
        asset_type:             fd.get('asset_type'),
        make:                   fd.get('make') || null,
        model:                  fd.get('model') || null,
        serial_number:          fd.get('serial_number') || null,
        description:            fd.get('description') || null,
        purchase_date:          fd.get('purchase_date') || null,
        purchase_price:         fd.get('purchase_price') ? parseFloat(fd.get('purchase_price')) : null,
        vendor:                 fd.get('vendor') || null,
        condition:              fd.get('condition'),
        assigned_to:            fd.get('assigned_to') || null,
        home_location:          fd.get('home_location'),
        calibration_required:   fd.get('calibration_required') === 'on',
        last_calibration_date:  fd.get('last_calibration_date') || null,
        next_calibration_date:  fd.get('next_calibration_date') || null,
        calibration_provider:   fd.get('calibration_provider') || null,
        notes:                  fd.get('notes') || null,
        created_by:             _user ? _user.email : 'unknown',  // set from authenticated session; DB trigger also enforces this
        checkout_status:        'available',
    };

    const btn = document.getElementById('reg-submit');
    btn.disabled = true; btn.textContent = 'Registering...';

    const { data, error } = await sb
        .from('asset_equipment')
        .insert(payload)
        .select()
        .single();

    if (error) {
        setAlert('Error registering asset: ' + error.message, 'error');
        btn.disabled = false; btn.textContent = `Register ${assetId}`;
    } else {
        showAsset(data);
    }
}

async function submitCheckout(evt) {
    evt.preventDefault();
    const fd  = new FormData(evt.target);
    const now = new Date().toISOString();
    const assetId = _asset.asset_id;

    const btn = document.getElementById('co-submit');
    btn.disabled = true; btn.textContent = 'Saving...';

    const { error: upErr } = await sb
        .from('asset_equipment')
        .update({
            checkout_status:     'checked-out',
            checked_out_to:      fd.get('checked_out_to'),
            checkout_date:       fd.get('checkout_date') ? new Date(fd.get('checkout_date')).toISOString() : now,
            checkout_site:       fd.get('checkout_site') || null,
            expected_return:     fd.get('expected_return') || null,
            last_checkout_notes: fd.get('notes') || null,
            last_seen_location:  fd.get('checkout_site') || null,
            last_seen_date:      now,
            last_seen_by:        fd.get('checked_out_to'),
        })
        .eq('asset_id', assetId);

    if (upErr) { setAlert('Error: ' + upErr.message, 'error'); btn.disabled = false; btn.textContent = 'Confirm Checkout'; return; }

    // Close any orphaned open log entries before creating the new one.
    // Normally there are none, but a previous failed check-in could leave one open.
    await sb.from('asset_checkout_log')
        .update({ return_date: new Date(fd.get('checkout_date') || now).toISOString() })
        .eq('asset_id', assetId)
        .is('return_date', null);

    // Write new log entry
    sb.from('asset_checkout_log').insert({
        asset_id:            assetId,
        checked_out_to:      fd.get('checked_out_to'),
        checkout_date:       new Date(fd.get('checkout_date') || now).toISOString(),
        checkout_site:       fd.get('checkout_site') || null,
        notes:               fd.get('notes') || null,
        performed_by_email:  _user ? _user.email : null,
    });

    loadAsset(assetId);
}

async function submitCheckin(evt) {
    evt.preventDefault();
    const fd  = new FormData(evt.target);
    const now = new Date().toISOString();
    const assetId = _asset.asset_id;

    const btn = document.getElementById('ci-submit');
    btn.disabled = true; btn.textContent = 'Saving...';

    const update = {
        checkout_status: 'available',
        checked_out_to:  null,
        checkout_date:   null,
        checkout_site:   null,
        expected_return: null,
        condition:       fd.get('condition'),
        last_seen_location: fd.get('return_location') || null,
        last_seen_date:  now,
        last_seen_by:    fd.get('returned_by'),
    };
    if (fd.get('return_location')) update.home_location = fd.get('return_location');

    const { error } = await sb.from('asset_equipment').update(update).eq('asset_id', assetId);
    if (error) { setAlert('Error: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Confirm Check In'; return; }

    // Close the open checkout log entry, recording who authenticated for the return
    sb.from('asset_checkout_log')
      .update({ return_date: now, notes: fd.get('notes') || null,
                returned_by_email: _user ? _user.email : null })
      .eq('asset_id', assetId)
      .is('return_date', null);

    loadAsset(assetId);
}

async function submitReassign(evt) {
    evt.preventDefault();
    const fd = new FormData(evt.target);
    const assetId = _asset.asset_id;
    const newOwner = fd.get('assigned_to').trim() || null;
    const today = new Date().toISOString().slice(0,10);

    const btn = document.getElementById('ra-submit');
    btn.disabled = true; btn.textContent = 'Saving...';

    const update = {
        assigned_to:    newOwner,
        assigned_date:  newOwner ? today : null,
        home_location:  fd.get('home_location').trim() || _asset.home_location || null,
        // Append the reason to notes so there's an audit trail.
        // auth: records the authenticated user's email so the entry cannot be forged.
        notes: [
            _asset.notes,
            `[${new Date().toLocaleDateString()}] Assignment changed by ${fd.get('changed_by')}` +
            (_user ? ` (auth: ${_user.email})` : '') +
            (newOwner ? ` — assigned to ${newOwner}` : ' — unassigned') +
            (fd.get('reason') ? `: ${fd.get('reason')}` : '')
        ].filter(Boolean).join('\n')
    };

    const { error } = await sb.from('asset_equipment').update(update).eq('asset_id', assetId);
    if (error) {
        setAlert('Error: ' + error.message, 'error');
        btn.disabled = false; btn.textContent = 'Save Assignment';
        return;
    }
    loadAsset(assetId);
}

async function submitTransfer(evt) {
    evt.preventDefault();
    const fd  = new FormData(evt.target);
    const now = new Date().toISOString();
    const assetId = _asset.asset_id;

    const btn = document.getElementById('tr-submit');
    btn.disabled = true; btn.textContent = 'Saving...';

    const transferDate = fd.get('transfer_date')
        ? new Date(fd.get('transfer_date')).toISOString()
        : now;

    // 1. Close the current open checkout log entry
    await sb.from('asset_checkout_log')
        .update({ return_date: transferDate })
        .eq('asset_id', assetId)
        .is('return_date', null);

    // 2. Update the equipment record with the new person
    const { error } = await sb.from('asset_equipment').update({
        checked_out_to:      fd.get('transfer_to'),
        checkout_date:       transferDate,
        checkout_site:       fd.get('checkout_site') || null,
        expected_return:     fd.get('expected_return') || null,
        last_checkout_notes: fd.get('notes') || null,
        checkout_status:     'checked-out',
        last_seen_location:  fd.get('checkout_site') || null,
        last_seen_date:      now,
        last_seen_by:        fd.get('transfer_to'),
    }).eq('asset_id', assetId);

    if (error) {
        setAlert('Error: ' + error.message, 'error');
        btn.disabled = false; btn.textContent = 'Confirm Transfer';
        return;
    }

    // 3. Open a new checkout log entry for the new person
    sb.from('asset_checkout_log').insert({
        asset_id:            assetId,
        checked_out_to:      fd.get('transfer_to'),
        checkout_date:       transferDate,
        checkout_site:       fd.get('checkout_site') || null,
        notes:               fd.get('notes') || `Transferred from ${_asset.checked_out_to || 'previous holder'}`,
        performed_by_email:  _user ? _user.email : null,
    });

    loadAsset(assetId);
}

async function submitUpdate(evt) {
    evt.preventDefault();
    const fd = new FormData(evt.target);
    const assetId = _asset.asset_id;

    const update = {
        serial_number:        fd.get('serial_number') || null,
        assigned_to:          fd.get('assigned_to') || null,
        home_location:        fd.get('home_location') || null,
        condition:            fd.get('condition'),
        notes:                fd.get('notes') || null,
    };
    if (_asset.calibration_required) {
        update.last_calibration_date = fd.get('last_calibration_date') || null;
        update.next_calibration_date = fd.get('next_calibration_date') || null;
    }
    // Admins can correct hardware identity fields — DB trigger also enforces this
    if (isAdmin()) {
        if (fd.get('asset_type')) update.asset_type = fd.get('asset_type');
        if (fd.get('make'))       update.make       = fd.get('make').trim() || null;
        if (fd.get('model'))      update.model      = fd.get('model').trim() || null;
    }

    const { error } = await sb.from('asset_equipment').update(update).eq('asset_id', assetId);
    if (error) { setAlert('Error: ' + error.message, 'error'); return; }
    loadAsset(assetId);
}

// ────────────────────────────────────────────────────────────────
// Auth + Init
// ────────────────────────────────────────────────────────────────
function handleAuthedSession(session) {
    _session = session; _user = session.user;
    const id = getIdFromUrl();
    if (id) loadAsset(id); else showSearch();
}

// Handle OAuth redirect-back and sign-out events
sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') {
        if (session.user.email.endsWith(PGCIS_DOMAIN)) {
            // Clean OAuth params from URL so they don't linger (preserves ?id=)
            const id = getIdFromUrl();
            const cleanUrl = window.location.pathname + (id ? `?id=${encodeURIComponent(id)}` : '');
            window.history.replaceState({}, '', cleanUrl);
            handleAuthedSession(session);
        } else {
            // Signed in but not a PGCIS account — sign them back out
            await sb.auth.signOut();
            showLostDevice(getIdFromUrl());
        }
    } else if (event === 'SIGNED_OUT') {
        _session = null; _user = null;
        showLostDevice(getIdFromUrl());
    }
});

(async function init() {
    const { data: { session } } = await sb.auth.getSession();

    if (session && session.user.email.endsWith(PGCIS_DOMAIN)) {
        // Already logged in with a valid PGCIS account
        handleAuthedSession(session);
    } else if (session) {
        // Session exists but wrong email domain — boot them out
        await sb.auth.signOut();
        showLostDevice(getIdFromUrl());
    } else {
        // No session. If there's a ?code= in the URL, Supabase is mid-OAuth
        // exchange and onAuthStateChange will fire SIGNED_IN shortly — keep
        // the spinner up. Otherwise show the lost/found screen.
        const isOAuthCallback = new URLSearchParams(window.location.search).has('code');
        if (!isOAuthCallback) showLostDevice(getIdFromUrl());
    }
})();
</script>
